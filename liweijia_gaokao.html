<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>高考倒计时 · 为梦想而战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免选中文字，保持界面整洁，不影响复制 */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', 'Noto Sans CJK SC', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* 背景装饰：柔和光晕 */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(circle at 30% 40%, rgba(255,215,120,0.08), rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        /* 主卡片 */
        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 68px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            padding: 30px 25px 45px;
            transition: all 0.3s ease;
            text-align: center;
        }

        /* 装饰线 */
        .gold-line {
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #f9b43a, #ffdd88, #f9b43a);
            margin: 16px auto 24px;
            border-radius: 4px;
        }

        /* 标题区 */
        .title-section h1 {
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .title-section p {
            color: #cbd5e1;
            font-size: 1rem;
            margin-top: 12px;
            font-weight: 400;
        }

        /* 倒计时主体 */
        .countdown-wrapper {
            margin: 40px 0 30px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .time-block {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 42px;
            padding: 18px 12px;
            min-width: 195px;
            width: 130px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: transform 0.2s ease;
            border: 1px solid rgba(255, 215, 120, 0.3);
        }

        .time-block:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 200, 80, 0.8);
            box-shadow: 0 22px 30px rgba(0,0,0,0.4);
        }

        .time-number {
            font-size: 4rem;
            font-weight: 800;
            font-family: 'Poppins', 'Segoe UI', monospace;
            background: linear-gradient(135deg, #FFF5E0, #FFD966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.1;
            letter-spacing: 4px;
        }

        .time-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            color: #FFE2A4;
            margin-top: 10px;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        /* 高考日期信息 + 励志标语 */
        .info-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 18px 20px;
            margin: 15px 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(4px);
        }

        .target-date {
            color: #ffe0a3;
            font-weight: 500;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 6px 15px;
            border-radius: 60px;
        }

        .target-date i {
            font-style: normal;
            font-size: 1.3rem;
        }

        .motto {
            font-size: 1rem;
            font-weight: 500;
            background: linear-gradient(120deg, #f9d976, #f39f86);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        /* 底部小提示 */
        .footer-note {
            font-size: 0.75rem;
            color: #7e8c9e;
            margin-top: 30px;
            border-top: 1px dashed rgba(255,215,140,0.3);
            padding-top: 18px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer-note span {
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 50px;
        }

        /* 响应式 */
        @media (max-width: 650px) {
            .card {
                padding: 20px 15px 35px;
            }
            .time-block {
                min-width: 85px;
                width: 85px;
                padding: 12px 5px;
            }
            .time-number {
                font-size: 2.4rem;
                letter-spacing: 2px;
            }
            .time-label {
                font-size: 0.7rem;
                letter-spacing: 1px;
            }
            .title-section h1 {
                font-size: 1.8rem;
            }
            .info-area {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .countdown-wrapper {
                gap: 12px;
            }
            .time-number {
                font-size: 2rem;
            }
        }

        /* 动画加载闪烁 */
        @keyframes gentlePulse {
            0% { opacity: 0.95; }
            100% { opacity: 1; }
        }
        .countdown-wrapper {
            animation: gentlePulse 1s ease;
        }
        button, .time-block {
            cursor: default;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title-section">
        <h1>📅 高考倒计时</h1>
        <div class="gold-line"></div>
        <p>为梦想蓄力 · 每一天都算数</p>
    </div>

    <!-- 倒计时数字区域 -->
    <div class="countdown-wrapper">
        <div class="time-block">
            <div class="time-number" id="days">0</div>
            <div class="time-label">天</div>
        </div>
        <div class="time-block">
            <div class="time-number" id="hours">0</div>
            <div class="time-label">小时</div>
        </div>
        <div class="time-block">
            <div class="time-number" id="minutes">0</div>
            <div class="time-label">分钟</div>
        </div>
        <div class="time-block">
            <div class="time-number" id="seconds">0</div>
            <div class="time-label">秒</div>
        </div>
    </div>

    <!-- 信息栏: 高考日期 + 励志语-->
    <div class="info-area">
        <div class="target-date">
            <i>🎯</i> 2031年6月7日 · 全国高考
        </div>
        <div class="motto">
            ✨ 乾坤未定，你我皆是黑马 ✨
        </div>
    </div>

    <div class="footer-note">
        <span>⏳ 实时精确至秒</span>
        <span>🌱 七年级同学 · 未来可期</span>
    </div>
</div>

<script>
    (function() {
        // ---------- 配置高考日期 ----------
        // 根据推算：七年级（初一） 2026年5月30日 → 高考年份2031年6月7日
        // 设定目标时间: 2031年6月7日 上午 09:00 (高考通常早上开考)
        // 使用本地时间(中国时区 UTC+8)，倒计时更亲切直观。
        // 目标日期: 2031-06-07 09:00:00
        const targetYear = 2031;
        const targetMonth = 5;     // 0-index: 5 表示 六月 (0=一月)
        const targetDay = 7;
        const targetHour = 9;
        const targetMinute = 0;
        const targetSecond = 0;
        
        // 创建目标Date对象（基于浏览器本地时区，中国用户显示北京时间，倒计时本地化）
        let targetDate = new Date(targetYear, targetMonth, targetDay, targetHour, targetMinute, targetSecond);
        
        // 防御: 如果由于某些异常原因目标时间已过(比如系统时间被调整到2031年后)，依然显示0并处理
        // 获取DOM元素
        const daysSpan = document.getElementById('days');
        const hoursSpan = document.getElementById('hours');
        const minutesSpan = document.getElementById('minutes');
        const secondsSpan = document.getElementById('seconds');
        
        // 优雅地更新倒计时
        function updateCountdown() {
            const now = new Date(); // 当前时间（本地）
            const distance = targetDate.getTime() - now.getTime();
            
            // 如果倒计时已经结束（距离<=0）
            if (distance <= 0) {
                daysSpan.innerText = '0';
                hoursSpan.innerText = '0';
                minutesSpan.innerText = '0';
                secondsSpan.innerText = '0';
                // 可选: 修改励志语表示高考已开始/已结束
                const mottoDiv = document.querySelector('.motto');
                if (mottoDiv && distance <= 0) {
                    mottoDiv.innerHTML = '🏆 高考正在进行 · 全力以赴 🏆';
                    mottoDiv.style.background = "linear-gradient(120deg, #FFD966, #FF9966)";
                    mottoDiv.style.webkitBackgroundClip = "text";
                    mottoDiv.style.backgroundClip = "text";
                }
                return;
            }
            
            // 计算剩余天数、小时、分钟、秒
            const totalSeconds = Math.floor(distance / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            // 更新DOM，保持两位数风格（但天数是自然数，不用补零更直观）
            daysSpan.innerText = days;
            hoursSpan.innerText = hours < 10 ? '0' + hours : hours;
            minutesSpan.innerText = minutes < 10 ? '0' + minutes : minutes;
            secondsSpan.innerText = seconds < 10 ? '0' + seconds : seconds;
        }
        
        // 监听页面可见性变化时，可选加一个及时更新，避免计时器积压，但无所谓，直接每秒钟刷新精确时间即可。
        // 初次立即运行
        updateCountdown();
        
        // 设置每秒刷新一次倒计时 (setInterval可能会有微小漂移但倒计时完全足够)
        const intervalId = setInterval(updateCountdown, 1000);
        
        // 可选: 确保目标日期如果因为年份边界、夏令时等微调依然正确，但中国无夏令时且日期固定，没有问题
        // 为了更严谨: 重新验证目标日期是否因系统时区导致意外偏差？ 比如new Date指定年月日时分秒是基于本地时间的，完全正确
        
        // 额外展示一个精准度提示: 如果当前年份晚于2031或者距离极大负数，clear掉不必要的定时器并显示提示
        // 但是如果当前时间已经超过2031-06-07 09:00:00 停止倒计时归零即可，不用清除定时器，归零状态不会再变。
        // 做一次额外保护: 如果距离永远不会变正，且文字已经为0，不再重复做多余操作.
        // 但是为了性能，当检测到距离小于0并且已经展示零散状态，可清除定时器
        function checkIfExpiredAndStop() {
            if (targetDate.getTime() - new Date().getTime() <= 0) {
                // 停止不必要的刷新
                if (intervalId) {
                    clearInterval(intervalId);
                }
                // 强制归零（已经是归零了, 但确保文字）
                daysSpan.innerText = '0';
                hoursSpan.innerText = '0';
                minutesSpan.innerText = '0';
                secondsSpan.innerText = '0';
            }
        }
        
        // 额外设置一个延迟检查，避免一直运行定时器浪费资源（无伤大雅）
        setTimeout(() => {
            if (targetDate.getTime() - new Date().getTime() <= 0) {
                if (intervalId) clearInterval(intervalId);
                const mottoDiv = document.querySelector('.motto');
                if (mottoDiv) mottoDiv.innerHTML = '🎉 高考已至 · 金榜题名 🎉';
            }
        }, 500);
        
        // 增加页面失去焦点再回来后可能存在的偏移，但定时器依然精准
        window.addEventListener('focus', () => {
            updateCountdown(); // 重新同步一下显示
        });
        
        // 优雅显示用户当前年级相关的提示，也可以在控制台保留年级信息
        console.log('高考倒计时已启动 | 目标: 2031年6月7日 | 当前学生: 七年级 (2026年5月)');
    })();
</script>
</body>
</html>
